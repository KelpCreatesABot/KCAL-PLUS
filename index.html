<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macros</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 15px;
  }

  .card {
    background: #111;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
  }

  input {
    width: 100%;
    font-size: 26px;
    padding: 18px 0;
    margin: 8px 0;
    border-radius: 14px;
    border: none;
    background: #1c1c1e;
    color: white;
    text-align: center;
  }

  button {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: #2c2c2e;
    color: white;
    font-size: 16px;
    margin-top: 10px;
  }

  .log-entry {
    background: #111;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
  }

  .delete-btn {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 16px;
    background: none;
    border: none;
    color: #ff453a;
  }

  .date {
    opacity: 0.6;
    font-size: 12px;
  }

  .progress {
    font-size: 14px;
    margin-top: 10px;
    opacity: 0.8;
  }
</style>

</head>

<body>

<div class="container">
  <h1 id="title">Today</h1>

  <div class="card">
    <input id="cal" placeholder="Calories" inputmode="decimal">
    <input id="pro" placeholder="Protein" inputmode="decimal" oninput="calculateCalories()">
    <input id="carb" placeholder="Carbs" inputmode="decimal" oninput="calculateCalories()">
    <input id="fat" placeholder="Fat" inputmode="decimal" oninput="calculateCalories()">

```
<button onclick="saveDay()">Save Day</button>
<button onclick="exportData()">Export Data</button>

<div id="progress" class="progress"></div>
```

  </div>

  <div id="log"></div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  let selectedDate = null;

  const GOALS = {
    cal: 2500,
    pro: 180,
    carb: 250,
    fat: 70
  };

  function getToday() {
    return new Date().toISOString().split("T")[0];
  }

  function getDayName(dateStr) {
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const d = new Date(dateStr);
    return days[d.getDay()];
  }

  function calculateCalories() {
    const p = +document.getElementById("pro").value || 0;
    const c = +document.getElementById("carb").value || 0;
    const f = +document.getElementById("fat").value || 0;

    const calories = (p * 4) + (c * 4) + (f * 9);
    document.getElementById("cal").value = calories || "";
  }

  function saveDay() {
    const cal = document.getElementById("cal").value;
    const pro = document.getElementById("pro").value;
    const carb = document.getElementById("carb").value;
    const fat = document.getElementById("fat").value;

    const date = selectedDate || getToday();

    const data = { date, cal, pro, carb, fat };

    let log = JSON.parse(localStorage.getItem("log") || "[]");

    log = log.filter(e => e.date !== date);
    log.unshift(data);

    localStorage.setItem("log", JSON.stringify(log));

    selectedDate = null;
    document.getElementById("title").innerText = "Today";

    renderLog();
    renderProgress();
  }

  function deleteDay(date) {
    let log = JSON.parse(localStorage.getItem("log") || "[]");
    log = log.filter(e => e.date !== date);
    localStorage.setItem("log", JSON.stringify(log));
    renderLog();
    renderProgress();
  }

  function getTodayData() {
    const log = JSON.parse(localStorage.getItem("log") || "[]");
    return log.find(e => e.date === getToday());
  }

  function renderProgress() {
    const today = getTodayData();
    const el = document.getElementById("progress");

    if (!today) {
      el.innerHTML = "";
      return;
    }

    el.innerHTML = `
      Calories: ${today.cal}/${GOALS.cal}<br>
      Protein: ${today.pro}/${GOALS.pro}<br>
      Carbs: ${today.carb}/${GOALS.carb}<br>
      Fat: ${today.fat}/${GOALS.fat}
    `;
  }

  function renderLog() {
    const log = JSON.parse(localStorage.getItem("log") || "[]");
    const logEl = document.getElementById("log");
    logEl.innerHTML = "";

    log.forEach(entry => {
      const div = document.createElement("div");
      div.className = "log-entry";

      div.innerHTML = `
        <button class="delete-btn" onclick="deleteDay('${entry.date}'); event.stopPropagation();">✕</button>
        <div class="date">${entry.date} (${getDayName(entry.date)})</div>
        ${entry.cal} kcal • P:${entry.pro} C:${entry.carb} F:${entry.fat}
      `;

      div.onclick = () => {
        selectedDate = entry.date;

        document.getElementById("cal").value = entry.cal;
        document.getElementById("pro").value = entry.pro;
        document.getElementById("carb").value = entry.carb;
        document.getElementById("fat").value = entry.fat;

        document.getElementById("title").innerText = entry.date;
      };

      logEl.appendChild(div);
    });
  }

  function exportData() {
    const data = localStorage.getItem("log") || "[]";
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "macros_backup.json";
    a.click();
  }

  renderLog();
  renderProgress();
</script>

</body>
</html>
