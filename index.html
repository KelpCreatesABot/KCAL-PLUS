<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macros</title>

<link rel="manifest" href="manifest.json">

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 15px;
  }

  .card {
    background: #111;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
  }

  input {
    width: 100%;
    font-size: 26px;
    padding: 18px 0;
    margin: 8px 0;
    border-radius: 14px;
    border: none;
    background: #1c1c1e;
    color: white;
    text-align: center;
  }

  button {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: #2c2c2e;
    color: white;
    font-size: 16px;
    margin-top: 10px;
  }

  .log-entry {
    background: #111;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
  }

  .date {
    opacity: 0.6;
    font-size: 12px;
  }
</style>
</head>

<body>

<div class="container">
  <h1 id="title">Today</h1>

  <div class="card">
    <input id="cal" placeholder="Calories">
    <input id="pro" placeholder="Protein">
    <input id="carb" placeholder="Carbs">
    <input id="fat" placeholder="Fat">
    <button onclick="saveDay()">Save Day</button>
  </div>

  <div id="log"></div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  let selectedDate = null;

  function getToday() {
    return new Date().toISOString().split("T")[0];
  }

  function saveDay() {
    const date = selectedDate || getToday();

    const data = {
      date,
      cal: cal.value,
      pro: pro.value,
      carb: carb.value,
      fat: fat.value
    };

    let log = JSON.parse(localStorage.getItem("log") || "[]");

    log = log.filter(e => e.date !== date);
    log.unshift(data);

    localStorage.setItem("log", JSON.stringify(log));

    selectedDate = null;
    title.innerText = "Today";

    renderLog();
  }

  function renderLog() {
    const log = JSON.parse(localStorage.getItem("log") || "[]");
    logEl.innerHTML = "";

    log.forEach(entry => {
      const div = document.createElement("div");
      div.className = "log-entry";

      div.innerHTML = `
        <div class="date">${entry.date}</div>
        ${entry.cal} kcal • P:${entry.pro} C:${entry.carb} F:${entry.fat}
      `;

      div.onclick = () => {
        selectedDate = entry.date;
        cal.value = entry.cal;
        pro.value = entry.pro;
        carb.value = entry.carb;
        fat.value = entry.fat;
        title.innerText = entry.date;
      };

      logEl.appendChild(div);
    });
  }

  const logEl = document.getElementById("log");
  renderLog();
</script>

</body>
</html>
